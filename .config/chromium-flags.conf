# Wayland platform
--ozone-platform-hint=auto
--use-gl=angle

# Combined enable-features line (no duplicates)
--enable-features=VaapiVideoDecoder,VaapiVideoDecodeLinuxGL,UseOzonePlatform,WebRTCPipeWireCapturer,Vulkan,DefaultANGLEVulkan

# Avoid known issues with VA-API on Intel
--disable-features=VaapiVideoDecoderForceSingleThreaded,WebRtcAllowLegacyGrabSchema
